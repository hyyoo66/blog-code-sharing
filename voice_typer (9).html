<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>음성 타이퍼</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap');
  :root {
    --bg:#f5f5f7; --surface:#ffffff; --border:#e0e0e0;
    --accent:#0a7c59; --accent2:#0066cc; --danger:#e53935;
    --text:#1a1a1a; --muted:#888888; --radius:12px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    background:var(--bg); color:var(--text);
    font-family:'Noto Sans KR',sans-serif;
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; padding:40px 20px;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, #0a7c5910, transparent),
      radial-gradient(ellipse 60% 40% at 80% 100%, #0066cc08, transparent);
    pointer-events:none; z-index:0;
  }
  .container { position:relative; z-index:1; width:100%; max-width:720px; display:flex; flex-direction:column; gap:20px; }

  header { display:flex; align-items:baseline; gap:12px; }
  header h1 { font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:700; color:var(--accent); }
  header span { font-size:12px; color:var(--muted); font-family:'JetBrains Mono',monospace; }

  .status-bar {
    display:flex; align-items:center; gap:10px;
    padding:10px 16px; background:var(--surface);
    border:1px solid var(--border); border-radius:var(--radius);
    font-size:13px; color:var(--muted);
  }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--muted); transition:background 0.3s; flex-shrink:0; }
  .dot.active { background:var(--accent); box-shadow:0 0 8px var(--accent)40; animation:pulse 1.2s infinite; }
  .dot.error { background:var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .waveform { display:flex; align-items:center; gap:3px; height:36px; padding:0 8px; }
  .wave-bar { width:3px; border-radius:2px; background:var(--accent); opacity:0.4; transform:scaleY(0.15); transform-origin:center; transition:transform 0.1s ease; }

  .panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; transition:border-color 0.3s; }
  .panel.recording { border-color:var(--accent); }
  .panel-header {
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 16px; border-bottom:1px solid var(--border);
    font-size:11px; font-family:'JetBrains Mono',monospace;
    color:var(--muted); letter-spacing:0.5px; text-transform:uppercase;
  }
  #mainText {
    width:100%; min-height:200px; padding:16px;
    background:transparent; border:none; outline:none;
    color:var(--text); font-family:'Noto Sans KR',sans-serif;
    font-size:16px; line-height:1.8; resize:vertical;
  }
  #mainText::placeholder { color:var(--muted); }
  .interim-text {
    padding:8px 16px 10px; font-size:14px; color:var(--muted);
    font-style:italic; min-height:34px;
    border-top:1px solid var(--border);
    display:flex; align-items:center; gap:8px;
  }
  .interim-text::before { content:'▶'; font-size:9px; color:var(--accent); flex-shrink:0; }

  .btn-group { display:flex; gap:10px; }
  .btn {
    display:flex; align-items:center; justify-content:center; gap:8px;
    padding:12px 18px; border-radius:var(--radius); border:none; cursor:pointer;
    font-family:'Noto Sans KR',sans-serif; font-size:14px; font-weight:700; transition:all 0.15s;
  }
  .btn:active { transform:scale(0.97); }
  .btn-primary { background:var(--accent); color:#fff; flex:2; }
  .btn-primary:hover { filter:brightness(1.1); }
  .btn-primary.recording { background:var(--danger); color:#fff; }
  .btn-copy { background:var(--surface); color:var(--text); border:1px solid var(--border); flex:1; }
  .btn-copy:hover { border-color:var(--accent); color:var(--accent); }
  .btn-copy.copied { color:var(--accent); border-color:var(--accent); }
  .btn-clear { background:var(--surface); color:var(--muted); border:1px solid var(--border); }
  .btn-clear:hover { color:var(--danger); border-color:var(--danger); }

  .options { display:flex; gap:20px; flex-wrap:wrap; }
  .option { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--muted); cursor:pointer; user-select:none; }
  .option input[type=checkbox] { accent-color:var(--accent); width:14px; height:14px; }
  .option:hover { color:var(--text); }

  .btn-lang { background:var(--surface); color:var(--muted); border:1px solid var(--border); flex:1; font-size:13px; }
  .btn-lang:hover { border-color:var(--accent2); color:var(--accent2); }
  .btn-lang.active { background:var(--accent2); color:#fff; border-color:var(--accent2); }

  .hint { font-size:11px; color:var(--muted); font-family:'JetBrains Mono',monospace; text-align:right; }
  kbd { background:var(--border); border-radius:4px; padding:1px 5px; font-size:11px; }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>🎙 음성 타이퍼</h1>
    <span>v260415-1630</span>
  </header>

  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <div class="waveform" id="waveform"></div>
    <span id="statusText">마이크 버튼을 눌러 시작하세요</span>
  </div>

  <div class="panel" id="mainPanel">
    <div class="panel-header">
      <span>텍스트 (수정 가능)</span>
      <span id="charCount" style="font-family:'JetBrains Mono',monospace;">0자</span>
    </div>
    <textarea id="mainText" placeholder="여기에 음성 인식 결과가 표시됩니다.&#10;말이 끝나면 문장부호가 자동으로 추가됩니다.&#10;직접 수정도 가능하고, 중간에 커서를 놓고 말하면 그 위치에 삽입됩니다."></textarea>
    <div class="interim-text" id="interimText"></div>
  </div>

  <div class="btn-group">
    <button class="btn btn-primary" id="recBtn" onclick="toggleRec()">
      <span id="recIcon">⏺</span><span id="recLabel">녹음 시작</span>
    </button>
    <button class="btn btn-copy" id="copyBtn" onclick="copyText()">📋 복사</button>
    <button class="btn btn-clear" onclick="clearAll()">🗑 지우기</button>
  </div>
  <div class="btn-group">
    <button class="btn btn-lang active" id="btnKo" onclick="setLang('ko-KR')">🇰🇷 한국어</button>
    <button class="btn btn-lang" id="btnEn" onclick="setLang('en-US')">🇺🇸 English</button>
  </div>

  <div class="options">
    <label class="option"><input type="checkbox" id="appendMode" checked> 이어쓰기</label>
    <label class="option"><input type="checkbox" id="autoCopy"> 자동 복사</label>
  </div>

  <div class="hint">
    <kbd>Space</kbd> 녹음 &nbsp;·&nbsp; <kbd>C</kbd> 복사 &nbsp;·&nbsp; <kbd>Del</kbd> 지우기
  </div>

</div>
<script>
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recog = null;
let isRec = false;
let waveBars = [];
let currentLang = 'ko-KR';

function setLang(lang) {
  currentLang = lang;
  document.getElementById('btnKo').classList.toggle('active', lang === 'ko-KR');
  document.getElementById('btnEn').classList.toggle('active', lang === 'en-US');
  // recog 객체 재사용 — 언어만 바꾸고 재시작 (마이크 권한 창 안 뜸)
  if (recog) recog.lang = currentLang;
  if (isRec) {
    try { recog.stop(); } catch {}
    // onend 에서 isRec=true 이면 자동 재시작됨
  }
}

// 커서 위치 (전역) — -1이면 맨 끝
let cursorPos = -1;
// 마지막 삽입된 구간 추적 (문장부호 교정용)
let lastInsertStart = -1;
let lastInsertEnd = -1;
let punctTimer = null;

const ta = document.getElementById('mainText');

// 커서 위치 추적
ta.addEventListener('click', () => { cursorPos = ta.selectionStart; });
ta.addEventListener('keyup', () => { cursorPos = ta.selectionStart; });
ta.addEventListener('input', updateCount);

// 파형 생성
const wf = document.getElementById('waveform');
for (let i = 0; i < 20; i++) {
  const b = document.createElement('div');
  b.className = 'wave-bar';
  wf.appendChild(b);
  waveBars.push(b);
}
setInterval(() => {
  waveBars.forEach((b, i) => {
    const h = isRec
      ? 0.15 + Math.random() * 0.85
      : 0.1 + Math.abs(Math.sin(Date.now() / 600 + i * 0.5)) * 0.12;
    b.style.transform = 'scaleY(' + h + ')';
    b.style.opacity = isRec ? '0.7' : '0.4';
  });
}, 90);

function setStatus(msg, type) {
  document.getElementById('statusText').textContent = msg;
  document.getElementById('dot').className = 'dot' + (type ? ' ' + type : '');
}

function toggleRec() {
  if (!SR) { setStatus('Chrome 또는 Edge를 사용해 주세요', 'error'); return; }
  if (isRec) {
    isRec = false;
    if (recog) recog.stop();
  } else {
    startRec();
  }
}

function startRec() {
  if (!recog) {
    recog = new SR();
    recog.lang = currentLang;
    recog.interimResults = true;
    recog.continuous = true;

    recog.onstart = () => {
      isRec = true;
      setStatus('🎙 듣는 중...', 'active');
      document.getElementById('recBtn').classList.add('recording');
      document.getElementById('recIcon').textContent = '⏹';
      document.getElementById('recLabel').textContent = '녹음 중지';
      document.getElementById('mainPanel').classList.add('recording');
    };

    recog.onresult = (e) => {
      let interim = '';
      let final = '';

      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) final += t;
        else interim += t;
      }

      document.getElementById('interimText').textContent = interim;

      if (final) {
        if (!document.getElementById('appendMode').checked) {
          ta.value = '';
          cursorPos = -1;
        }

        // 삽입 위치 결정
        const val = ta.value;
        const pos = (cursorPos < 0 || cursorPos > val.length) ? val.length : cursorPos;
        const before = val.slice(0, pos);
        const after = val.slice(pos);
        const sep = (before.length > 0 && !before.endsWith(' ') && !before.endsWith('\n')) ? ' ' : '';

        // 영어일 때 문장 첫 글자 대문자
        let chunk = final;
        if (currentLang === 'en-US') {
          const prevText = (before + sep).trimEnd();
          const isNewSentence = prevText.length === 0 || /[.!?]$/.test(prevText);
          if (isNewSentence) chunk = chunk.charAt(0).toUpperCase() + chunk.slice(1);
        }

        const inserted = sep + chunk;
        ta.value = before + inserted + after;

        // 삽입 구간 기록
        lastInsertStart = before.length + sep.length;
        lastInsertEnd = lastInsertStart + chunk.length;

        // 커서를 삽입된 텍스트 끝으로
        cursorPos = lastInsertEnd;
        ta.setSelectionRange(cursorPos, cursorPos);
        ta.focus();
        updateCount();

        // 300ms 후 교정
        clearTimeout(punctTimer);
        punctTimer = setTimeout(() => applyPunct(), 300);
      }
    };

    recog.onerror = (e) => {
      if (e.error === 'not-allowed') {
        setStatus('마이크 권한을 허용해 주세요', 'error');
        isRec = false;
        resetBtn();
      } else if (e.error === 'no-speech') {
        // no-speech 시 재시작 (영어에서 자주 발생하는 Chrome 버그 대응)
        if (isRec) {
          try { recog.stop(); } catch {}
        }
      } else if (e.error !== 'aborted') {
        setStatus('오류: ' + e.error, 'error');
      }
    };

    recog.onend = () => {
      document.getElementById('interimText').textContent = '';
      if (isRec) {
        try { recog.start(); } catch (err) {}
      } else {
        resetBtn();
        setStatus('중지됨 — 버튼을 눌러 재시작');
      }
    };
  }

  isRec = true;
  try { recog.start(); } catch (err) {}
}

function resetBtn() {
  document.getElementById('recBtn').classList.remove('recording');
  document.getElementById('recIcon').textContent = '⏺';
  document.getElementById('recLabel').textContent = '녹음 시작';
  document.getElementById('mainPanel').classList.remove('recording');
}

// 마지막 삽입 구간에만 문장부호 교정 적용
function applyPunct() {
  if (lastInsertStart < 0) return;

  const val = ta.value;
  let chunk = val.slice(lastInsertStart, lastInsertEnd).trim();
  if (!chunk) return;

  // 접속사 앞 쉼표
  chunk = chunk.replace(/(\s+)(근데|그런데|그리고|하지만|그래서|그러나|또한|그럼|그러면)(\s+)/g, ', $2$3');

  // 끝 문장부호
  if (!/[.?!]$/.test(chunk)) {
    const isQ = /(누구|어디|언제|어떻게|왜|뭐|무엇|몇|어느|어떤|니|냐|나요|은가|는가|을까|ㄹ까|을까요|ㄹ까요|있나요|있나|인가요|인가|할까요|할까|인지|인데요|세요|죠|지요|하나요|건가요|건가|니까|왔니|갔니|됐니|했니|봤니|줬니|먹었니)$/.test(chunk);
    chunk += isQ ? '?' : '.';
  }

  // 해당 구간만 교정본으로 교체
  const before = val.slice(0, lastInsertStart);
  const after = val.slice(lastInsertEnd);
  ta.value = before + chunk + after;

  // 커서를 교정된 텍스트 끝으로
  cursorPos = lastInsertStart + chunk.length;
  ta.setSelectionRange(cursorPos, cursorPos);
  ta.focus();

  lastInsertStart = -1;
  lastInsertEnd = -1;
  updateCount();

  if (document.getElementById('autoCopy').checked) {
    navigator.clipboard.writeText(ta.value).catch(() => {});
  }
}

function updateCount() {
  document.getElementById('charCount').textContent = ta.value.length + '자';
}

function copyText() {
  const text = ta.value;
  if (!text.trim()) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    const orig = btn.textContent;
    btn.textContent = '✅ 복사됨!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1800);
  });
}

function clearAll() {
  ta.value = '';
  document.getElementById('interimText').textContent = '';
  cursorPos = -1;
  lastInsertStart = -1;
  lastInsertEnd = -1;
  updateCount();
}

document.addEventListener('keydown', (e) => {
  if (['TEXTAREA', 'INPUT'].includes(e.target.tagName)) return;
  if (e.code === 'Space') { e.preventDefault(); toggleRec(); }
  if (e.code === 'KeyC') copyText();
  if (e.code === 'Delete') clearAll();
});
</script>
</body>
</html>
